<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIBE — Company News Intelligence</title>
  <meta name="description" content="VIBE: Real-time news intelligence dashboard. Search any company and get the latest sentiment-analyzed news articles instantly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c14;
      --surface: #111520;
      --surface2: #161b2e;
      --border: rgba(255,255,255,0.07);
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --accent-glow: rgba(99,102,241,0.25);
      --text: #e8eaf0;
      --text-muted: #7a7f9a;
      --positive: #22c55e;
      --negative: #ef4444;
      --neutral: #94a3b8;
      --ai: #6366f1;
      --finance: #f59e0b;
      --legal: #ef4444;
      --product: #06b6d4;
      --ma: #a855f7;
      --people: #ec4899;
      --general: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background mesh ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(99,102,241,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139,92,246,0.10) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      padding: 48px 24px 36px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 2.6rem; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, #c7d2fe 0%, #818cf8 40%, #a78bfa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px var(--accent);
      animation: pulse 2s ease-in-out infinite;
      display: inline-block; margin-bottom: 2px;
      -webkit-text-fill-color: initial;
    }
    @keyframes pulse { 0%,100%{box-shadow:0 0 10px var(--accent)} 50%{box-shadow:0 0 28px var(--accent),0 0 50px var(--accent2)} }

    .tagline {
      margin-top: 8px; color: var(--text-muted);
      font-size: 0.95rem; font-weight: 400; letter-spacing: 0.3px;
    }

    /* ── Search bar ── */
    .search-wrap {
      position: relative; z-index: 10;
      max-width: 640px; margin: 40px auto 0;
      padding: 0 24px;
      display: flex; gap: 10px;
    }
    .search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: 14px 20px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .btn {
      border: none; cursor: pointer; border-radius: 14px;
      font-family: 'Inter', sans-serif; font-weight: 600;
      font-size: 0.9rem; padding: 14px 22px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }
    .btn-primary:hover { opacity: 0.9; box-shadow: 0 4px 28px rgba(99,102,241,0.5); }
    .btn-refresh {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-refresh:hover { color: var(--text); border-color: var(--accent); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Stats bar ── */
    .stats-bar {
      position: relative; z-index: 10;
      max-width: 960px; margin: 28px auto 0;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .stats-label { color: var(--text-muted); font-size: 0.85rem; }
    .stats-label span { color: var(--text); font-weight: 600; }

    /* ── Loading ── */
    .spinner {
      display: none; margin: 80px auto;
      width: 42px; height: 42px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      text-align: center; color: var(--text-muted);
      font-size: 0.9rem; margin-top: 16px; display: none;
    }

    /* ── Error toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #1e0a0a; border: 1px solid #ef444466;
      color: #fca5a5; border-radius: 12px; padding: 14px 22px;
      font-size: 0.875rem; font-weight: 500; z-index: 100;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      max-width: 90vw; text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 80px 24px; display: none;
    }
    .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }
    .empty-state p { color: var(--text-muted); font-size: 0.9rem; }

    /* ── Articles grid ── */
    #results {
      position: relative; z-index: 10;
      max-width: 960px; margin: 32px auto 60px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 18px;
    }

    /* ── Article card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 24px;
      display: flex; flex-direction: column; gap: 14px;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.45s forwards;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: rgba(99,102,241,0.4);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      transform: translateY(-2px);
    }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }

    .card-badges { display: flex; gap: 7px; flex-shrink: 0; flex-wrap: wrap; }

    .badge {
      font-size: 0.7rem; font-weight: 600; padding: 3px 10px;
      border-radius: 999px; letter-spacing: 0.3px; text-transform: uppercase;
    }
    .badge-positive { background: rgba(34,197,94,0.15); color: var(--positive); border: 1px solid rgba(34,197,94,0.3); }
    .badge-negative { background: rgba(239,68,68,0.15); color: var(--negative); border: 1px solid rgba(239,68,68,0.3); }
    .badge-neutral { background: rgba(148,163,184,0.1); color: var(--neutral); border: 1px solid rgba(148,163,184,0.2); }

    .category-chip {
      font-size: 0.68rem; font-weight: 600; padding: 3px 10px;
      border-radius: 999px; letter-spacing: 0.2px;
    }
    .cat-ai      { background: rgba(99,102,241,0.15); color: var(--ai); }
    .cat-finance { background: rgba(245,158,11,0.15); color: var(--finance); }
    .cat-legal   { background: rgba(239,68,68,0.15);  color: var(--legal); }
    .cat-product { background: rgba(6,182,212,0.15);  color: var(--product); }
    .cat-ma      { background: rgba(168,85,247,0.15); color: var(--ma); }
    .cat-people  { background: rgba(236,72,153,0.15); color: var(--people); }
    .cat-general { background: rgba(100,116,139,0.15);color: var(--general); }

    .card-title {
      font-size: 0.975rem; font-weight: 600; line-height: 1.5;
      color: var(--text); flex: 1;
    }

    .card-meta {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
    }
    .card-source {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; color: var(--text-muted);
    }
    .source-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
    }
    .card-date { font-size: 0.78rem; color: var(--text-muted); }

    .card-footer { display: flex; justify-content: flex-end; }
    .read-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.82rem; font-weight: 600; color: var(--accent);
      text-decoration: none; padding: 7px 16px;
      border: 1px solid rgba(99,102,241,0.3); border-radius: 8px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .read-link:hover {
      background: rgba(99,102,241,0.12);
      border-color: var(--accent);
      color: #c7d2fe;
    }
    .read-link svg { transition: transform 0.2s; }
    .read-link:hover svg { transform: translate(2px, -2px); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    VIBE
  </div>
  <p class="tagline">Real-time company news intelligence · NLP-powered sentiment & categorization</p>

  <div class="search-wrap">
    <input
      type="text"
      id="company"
      class="search-input"
      placeholder="Search company — Tesla, Amazon, Tata…"
      autocomplete="off"
    />
    <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">Search</button>
    <button class="btn btn-refresh" id="refreshBtn" onclick="doRefresh()" title="Refresh data" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>
</header>

<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stats-label">Showing <span id="statCount">0</span> articles for <span id="statCompany"></span></div>
  <div class="stats-label" id="statTime"></div>
</div>

<div style="position:relative;z-index:10;max-width:960px;margin:0 auto;padding:0 24px">
  <div class="spinner" id="spinner"></div>
  <div class="loading-text" id="loadingText">Fetching latest news…</div>
</div>

<div class="empty-state" id="emptyState">
  <div class="empty-icon">📭</div>
  <h3>No articles found</h3>
  <p>Try a different company name or click Refresh to fetch live data.</p>
</div>

<div id="results"></div>

<div class="toast" id="toast"></div>

<script>
  let currentCompany = "";

  // ── Helpers ─────────────────────────────────────────────────────

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 4000);
  }

  function setLoading(on) {
    document.getElementById("spinner").style.display = on ? "block" : "none";
    document.getElementById("loadingText").style.display = on ? "block" : "none";
    document.getElementById("searchBtn").disabled = on;
    document.getElementById("refreshBtn").disabled = on;
  }

  function formatDate(raw) {
    if (!raw) return "";
    try {
      // raw: "2026-04-25 10:30:00 UTC"
      const d = new Date(raw.replace(" UTC","Z"));
      return d.toLocaleString("en-IN", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" });
    } catch { return raw; }
  }

  function getCategoryClass(cat) {
    if (!cat) return "cat-general";
    const c = cat.toLowerCase();
    if (c.includes("ai") || c.includes("tech")) return "cat-ai";
    if (c.includes("finance") || c.includes("market")) return "cat-finance";
    if (c.includes("legal") || c.includes("regulat")) return "cat-legal";
    if (c.includes("product") || c.includes("launch")) return "cat-product";
    if (c.includes("merger") || c.includes("acqui")) return "cat-ma";
    if (c.includes("people") || c.includes("leader")) return "cat-people";
    return "cat-general";
  }

  function getSentimentClass(s) {
    if (!s) return "badge-neutral";
    const sl = s.toLowerCase();
    if (sl.includes("positive")) return "badge-positive";
    if (sl.includes("negative")) return "badge-negative";
    return "badge-neutral";
  }

  function getSentimentIcon(s) {
    if (!s) return "◦";
    const sl = s.toLowerCase();
    if (sl.includes("positive")) return "↑";
    if (sl.includes("negative")) return "↓";
    return "◦";
  }

  // ── Render ───────────────────────────────────────────────────────

  function renderArticles(articles, company) {
    const container = document.getElementById("results");
    const emptyState = document.getElementById("emptyState");
    const statsBar = document.getElementById("statsBar");

    container.innerHTML = "";
    emptyState.style.display = "none";

    if (!articles || articles.length === 0) {
      emptyState.style.display = "block";
      statsBar.style.display = "none";
      return;
    }

    statsBar.style.display = "flex";
    document.getElementById("statCount").textContent = articles.length;
    document.getElementById("statCompany").textContent = `"${company}"`;
    if (articles[0] && articles[0].Scraped_At) {
      const s = new Date(articles[0].Scraped_At);
      document.getElementById("statTime").textContent =
        "Last scraped: " + s.toLocaleString("en-IN", { hour:"2-digit", minute:"2-digit", day:"numeric", month:"short" });
    }

    articles.forEach((a, i) => {
      const catClass = getCategoryClass(a.Category);
      const sentClass = getSentimentClass(a.Sentiment);
      const sentIcon = getSentimentIcon(a.Sentiment);
      const link = a.Link || "#";
      const title = a.Title || "No title";
      // Handle both new schema (Source) and old schema (Company as source)
      const source = a.Source || a.Company || "Unknown Source";
      // Handle both new schema (Published) and old schema (Date)
      const pub = formatDate(a.Published || a.Date);
      const cat = a.Category || "General News";
      const sent = a.Sentiment || "Neutral";

      const card = document.createElement("div");
      card.className = "card";
      card.style.animationDelay = `${i * 60}ms`;
      card.innerHTML = `
        <div class="card-header">
          <div class="card-title">${title}</div>
          <div class="card-badges">
            <span class="badge ${sentClass}">${sentIcon} ${sent}</span>
          </div>
        </div>
        <div>
          <span class="category-chip ${catClass}">${cat}</span>
        </div>
        <div class="card-meta">
          <div class="card-source">
            <span class="source-dot"></span>
            <span>${source}</span>
          </div>
          <div class="card-date">${pub}</div>
        </div>
        <div class="card-footer">
          <a href="${link}" target="_blank" rel="noopener noreferrer" class="read-link">
            Read Article
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
            </svg>
          </a>
        </div>
      `;
      container.appendChild(card);
    });
  }

  // ── API calls ────────────────────────────────────────────────────

  async function doSearch() {
    const raw = document.getElementById("company").value.trim();
    if (!raw) { showToast("Please enter a company name."); return; }

    currentCompany = raw;
    setLoading(true);
    document.getElementById("results").innerHTML = "";
    document.getElementById("statsBar").style.display = "none";
    document.getElementById("emptyState").style.display = "none";
    document.getElementById("refreshBtn").style.display = "none";

    try {
      const res = await fetch(`/articles?company=${encodeURIComponent(raw)}`);
      const data = await res.json();

      if (!res.ok || data.error) {
        showToast(data.error || "Something went wrong.");
        return;
      }
      renderArticles(data.articles, data.company);
      document.getElementById("refreshBtn").style.display = "inline-flex";
    } catch (err) {
      showToast("Network error — is the server running?");
    } finally {
      setLoading(false);
    }
  }

  async function doRefresh() {
    if (!currentCompany) { showToast("Search for a company first."); return; }

    setLoading(true);
    document.getElementById("results").innerHTML = "";
    document.getElementById("statsBar").style.display = "none";
    document.getElementById("emptyState").style.display = "none";
    document.getElementById("loadingText").textContent = "Refreshing live data...";

    try {
      const res = await fetch(`/refresh?company=${encodeURIComponent(currentCompany)}`);
      const data = await res.json();

      if (!res.ok || data.error) {
        showToast(data.error || "Refresh failed.");
        return;
      }
      renderArticles(data.articles, data.company);
    } catch (err) {
      showToast("Network error during refresh.");
    } finally {
      setLoading(false);
      document.getElementById("loadingText").textContent = "Fetching latest news...";
    }
  }

  // ── Enter key support ────────────────────────────────────────────
  document.getElementById("company").addEventListener("keydown", e => {
    if (e.key === "Enter") doSearch();
  });
</script>
</body>
</html>
